<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // START</title>
    <meta name="referrer" content="no-referrer">
    <link rel="icon" type="image/png" href="images/plxeyestiny.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        /* --- GLOBAL UI & CURSORS --- */
        * { cursor: url('images/cursor.png'), auto !important; }
        *:active { cursor: url('images/cursor-click.png'), auto !important; }

        a, button, .suggestion-item, #drawer-tab, select, .handle, .toggle-btn, .link-card, .link-card *, .clear-btn {
            cursor: url('images/link-select.png'), pointer !important;
        }
        a:active, button:active, .suggestion-item:active, #drawer-tab:active, select:active, .link-card:active, .clear-btn:active {
            cursor: url('images/link-select-click.png'), pointer !important;
        }

        /* --- TERMINAL TEXT BUTTONS --- */
        .quick-links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; max-width: 900px; margin-top: 2rem;}
        .link-card { 
            background: #050505; border: 2px solid #222; padding: 10px 20px; 
            text-decoration: none; min-width: 120px; text-align: center;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .link-card:hover { border-color: #fff; background: #111; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.05); }
        .link-label { color: #666; font-family: 'PixeloidSansBold', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: color 0.2s; }
        .link-card:hover .link-label { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        
        /* --- SHORTCUT BADGE --- */
        .search-box-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        #shortcut-badge {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            padding: 4px 8px; font-family: 'PixeloidSansBold', sans-serif; font-size: 10px; letter-spacing: 2px;
            background: #000; border: 1px solid #333; color: #fff;
            opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 10;
        }
        #shortcut-badge.show { opacity: 1; right: 24px; }
        #shortcut-badge.youtube { border-color: #f00; color: #f00; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        #shortcut-badge.google { border-color: #00ff00; color: #00ff00; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        #shortcut-badge.reddit { border-color: #ff8800; color: #ff8800; box-shadow: 0 0 10px rgba(255,136,0,0.2); }
        
        /* Basic hides to prevent glitchy layout */
        #suggestions-box { display: none; position: absolute; width: 100%; background: #050505; border: 1px solid #333; z-index: 100;}
        #suggestions-box.show { display: block; }
        .suggestion-item { padding: 10px; color: #aaa; border-bottom: 1px solid #111; }
        .suggestion-item.active-item, .suggestion-item:hover { background: #111; color: #fff; }
    </style>
</head>
<body>

    <div id="clock-container" style="text-align: center; margin-top: 10vh; margin-bottom: 2rem;">
        <h1 id="clock" style="font-size: 4rem; margin: 0; color: #fff;">00:00:00</h1>
        <h3 id="greeting" style="color: #666; margin: 5px 0;">SYSTEM_INIT</h3>
        <div id="weather" style="color: #888; font-size: 0.9rem; margin-top: 10px;">Loading Weather...</div>
    </div>

    <div class="search-box-container">
        <input type="text" id="search-box" class="search-box" autocomplete="off" spellcheck="false" autofocus placeholder="> enter command...">
        <div id="shortcut-badge"></div>
        <div id="suggestions-box"></div>
    </div>

    <div id="quick-links" class="quick-links"></div>

    <div id="settings-drawer" class="drawer">
        <div id="drawer-tab">SETTINGS</div>
        <div class="drawer-content" style="padding: 20px;">
            <p>Settings Module Online</p>
            </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const config = {
            militaryTime: false,
            engine: 'duckduckgo',
            links: [
                { name: "YouTube", url: "https://youtube.com" },
                { name: "Reddit", url: "https://reddit.com" },
                { name: "GitHub", url: "https://github.com" },
                { name: "Gmail", url: "https://mail.google.com" }
            ]
        };

        // --- DOM ELEMENTS ---
        const searchInput = document.getElementById('search-box');
        const suggestionsBox = document.getElementById('suggestions-box');
        const badge = document.getElementById('shortcut-badge');
        const searchWrapper = document.querySelector('.search-box-container');
        const drawer = document.getElementById('settings-drawer');
        const drawerTab = document.getElementById('drawer-tab');

        // --- AUDIO ENGINE (STUBBED) ---
        function playSound(type) {
            // Re-link your audio files here if you want the terminal clicks back
            // console.log("Played sound: " + type);
        }

        // --- CLOCK & GREETING ---
        function updateClock() {
            const now = new Date();
            const month = now.getMonth();
            const date = now.getDate();
            const day = now.getDay();
            let h = now.getHours(), m = String(now.getMinutes()).padStart(2, '0'), s = String(now.getSeconds()).padStart(2, '0');
            
            if (!config.militaryTime) {
                const ampm = h >= 12 ? 'PM' : 'AM'; 
                h = h % 12 || 12;
                document.getElementById('clock').innerText = `${h}:${m}:${s} ${ampm}`;
            } else {
                h = String(h).padStart(2, '0');
                document.getElementById('clock').innerText = `${h}:${m}:${s}`;
            }
            
            let greetingText = "";
            if (month === 9 && date === 31) greetingText = "SYSTEM_HAUNTED";
            else if (month === 11 && date === 25) greetingText = "MERRY_CRISIS";
            else if (month === 4 && date === 17) greetingText = "HAPPY_BIRTHDAY";
            else if (month === 0 && date === 1) greetingText = "NEW_CYCLE_INITIATED";
            else if (day === 5 && now.getHours() >= 17) greetingText = "INITIATE_WEEKEND";
            else {
                greetingText = now.getHours() < 12 ? "GOOD_MORNING" : now.getHours() < 18 ? "GOOD_AFTERNOON" : "GOOD_EVENING";
            }
            document.getElementById('greeting').innerText = greetingText;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- WEATHER (STUBBED API) ---
        // Make sure to insert your specific weather API logic back here if you have a custom one
        document.getElementById('weather').innerText = "WEATHER_MODULE_STANDBY";

        // --- QUICK LINKS (TEXT BUTTONS) ---
        function renderLinks() {
            const container = document.getElementById('quick-links');
            container.innerHTML = config.links.map((link, index) => `
                <a href="${link.url}" class="link-card" data-index="${index}">
                    <div class="link-label">${link.name}</div>
                </a>
            `).join('');
            
            document.querySelectorAll('.link-card').forEach(card => {
                card.onmouseenter = () => playSound('hover');
                card.onclick = () => playSound('click');
            });
        }
        renderLinks();

        // --- SEARCH ROUTING ---
        function executeSearch(val) {
            if(!val) return;
            const q = encodeURIComponent(val);
            const lowerVal = val.toLowerCase();
            let url = "";
            
            if(lowerVal.startsWith('g ')) url = `https://www.google.com/search?q=${encodeURIComponent(val.substring(2))}`;
            else if(lowerVal.startsWith('yt ')) url = `https://www.youtube.com/results?search_query=${encodeURIComponent(val.substring(3))}`;
            else if(lowerVal.startsWith('r/')) url = `https://www.reddit.com/${val}`;
            else {
                if(config.engine === 'google') url = `https://www.google.com/search?q=${q}`;
                else if(config.engine === 'youtube') url = `https://www.youtube.com/results?search_query=${q}`;
                else url = `https://duckduckgo.com/?q=${q}`;
            }
            window.location.replace(url);
        }

        // --- PREDICTIVE TEXT & BOT-PROOFING ---
        let currentFocus = -1;
        let debounceTimer; // The hero variable that caused the crash earlier

        searchInput.oninput = () => {
            const query = searchInput.value.trimStart();
            const lowerQuery = query.toLowerCase();
            
            // Handle Shortcut Badges
            if (lowerQuery.startsWith('yt ')) { badge.className = 'show youtube'; badge.innerText = 'YOUTUBE'; }
            else if (lowerQuery.startsWith('g ')) { badge.className = 'show google'; badge.innerText = 'GOOGLE'; }
            else if (lowerQuery.startsWith('r/')) { badge.className = 'show reddit'; badge.innerText = 'REDDIT'; }
            else { badge.className = ''; }

            // Turn off predictive search if query is empty OR if using a custom shortcut
            if (query.length === 0 || lowerQuery.startsWith('yt ') || lowerQuery.startsWith('g ') || lowerQuery.startsWith('r/')) { 
                suggestionsBox.classList.remove('show'); 
                return; 
            }
            
            // Bot-Proof Delay: Wait 300ms before pinging the proxy so we don't spam DDG
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                try {
                    const targetUrl = `https://duckduckgo.com/ac/?q=${encodeURIComponent(query)}`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
                    const response = await fetch(proxyUrl);
                    const data = await response.json();
                    
                    suggestionsBox.innerHTML = '';
                    currentFocus = -1;
                    
                    if (data && data.length > 0) {
                        data.slice(0, 5).forEach(item => {
                            const div = document.createElement('div');
                            div.className = 'suggestion-item'; 
                            div.innerText = item.phrase;
                            div.onmouseenter = () => { currentFocus = -1; playSound('hover'); removeActive(suggestionsBox.querySelectorAll('.suggestion-item')); };
                            div.onclick = () => { playSound('click'); executeSearch(item.phrase); };
                            suggestionsBox.appendChild(div);
                        });
                        suggestionsBox.classList.add('show');
                    } else { suggestionsBox.classList.remove('show'); }
                } catch (error) { suggestionsBox.classList.remove('show'); }
            }, 300); 
        };

        // --- ARROW KEYS & ENTER KEY ---
        searchInput.addEventListener('keydown', function(e) {
            let items = suggestionsBox.querySelectorAll('.suggestion-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentFocus++;
                addActive(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentFocus--;
                addActive(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                playSound('click');
                // If a dropdown item is highlighted, search that. Otherwise, search what's in the box.
                if (currentFocus > -1 && items.length > 0 && suggestionsBox.classList.contains('show')) {
                    items[currentFocus].click();
                } else {
                    executeSearch(searchInput.value);
                }
            }
        });

        function addActive(items) {
            if (!items || items.length === 0) return;
            removeActive(items);
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            items[currentFocus].classList.add('active-item');
            playSound('hover');
        }

        function removeActive(items) {
            items.forEach(item => item.classList.remove('active-item'));
        }

        // --- DRAWER TOGGLE ---
        drawerTab.addEventListener('click', () => {
            drawer.classList.toggle('open');
            playSound('click');
        });

    </script>
</body>
</html>
