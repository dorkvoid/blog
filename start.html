<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL // START</title>
    <link rel="icon" type="image/png" href="images/plxeyestiny.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <style>
        /* --- GLOBAL UI, CURSORS, & PIXEL RENDERING --- */
        * { 
            cursor: url('images/cursor.png'), auto !important; 
            -webkit-font-smoothing: none; 
            -moz-osx-font-smoothing: grayscale; 
            text-rendering: optimizeSpeed;
            font-smooth: never;
        }
        *:active { cursor: url('images/cursor-click.png'), auto !important; }

        img { image-rendering: pixelated; }

        a, button, .suggestion-item, #drawer-tab, select, .handle, .toggle-btn, .link-card, .link-card *, .clear-btn {
            cursor: url('images/link-select.png'), pointer !important;
        }
        a:active, button:active, .suggestion-item:active, #drawer-tab:active, select:active, .link-card:active, .link-card:active *, .clear-btn:active {
            cursor: url('images/link-select-click.png'), pointer !important;
        }

        /* --- CUSTOM SCROLLBARS --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; border-left: 1px solid #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- GLOBAL SCANLINES (Subtle Texture) --- */
        body {
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding-top: 18vh;
            height: 100vh; margin: 0; overflow: hidden; background: black;
            box-sizing: border-box;
        }
        body.low-power { filter: brightness(0.7); }
        
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.04) 50%);
            background-size: 100% 4px;
            pointer-events: none; 
            z-index: 999;
        }

        /* --- BOSS MODE --- */
        #boss-screen {
            display: none;
            position: absolute; top: 20px; left: 20px;
            color: #ccc; font-family: 'PixeloidSans', sans-serif; font-size: 16px;
            z-index: 1000;
        }
        #boss-screen::after { content: '_'; animation: blink 1s infinite; }
        body.boss-mode > *:not(#boss-screen):not(style):not(script) { display: none !important; }
        body.boss-mode::after { display: none !important; } 
        body.boss-mode #boss-screen { display: block; }

        /* --- COMMAND CENTER --- */
        .command-center {
            flex-shrink: 0;
            width: 100%; display: flex; flex-direction: column; align-items: center;
            margin-bottom: 0px;
        }

        .terminal-clock { 
            font-family: 'PixeloidSansBold', sans-serif; 
            font-size: 56px; 
            line-height: 56px; 
            color: white; 
            margin-bottom: 0px; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.1); 
        }
        #greeting { 
            font-family: 'PixeloidSansBold', sans-serif; 
            color: #444; 
            margin-top: 8px;
            margin-bottom: 24px; 
            font-size: 12px; 
            line-height: 12px;
            letter-spacing: 4px; 
            text-transform: uppercase; 
        }

        /* --- ANIMATED SEARCH BAR --- */
        .search-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 650px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: max-width 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
            margin: 0 auto;
        }
        
        .search-wrapper.has-text { max-width: 718px; }

        .search-wrapper::before {
            content: '>'; position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
            color: #fff; font-family: 'PixeloidSansBold', sans-serif; font-size: 24px; z-index: 5;
            animation: blink 1s infinite; text-shadow: 0 0 5px rgba(255,255,255,0.3);
            pointer-events: none;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .search-box-container {
            position: relative;
            flex: 0 0 650px;
            height: 60px;
        }

        .search-box { 
            width: 100%;
            height: 100%;
            background: #050505; border: 2px solid #222; color: white; 
            font-family: 'PixeloidSans', sans-serif; font-size: 20px; 
            padding: 0 20px 0 50px; 
            outline: none; text-align: left; box-sizing: border-box; 
            transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s; 
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02);
            background-image: linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.02));
            background-size: 3px 100%;
            cursor: text !important;
            z-index: 2;
        }
        
        .search-box.flicker {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.2) !important;
            border-color: #fff !important;
        }

        .search-box:focus { 
            border-color: #fff; background-color: #0a0a0a; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), inset 0 0 15px rgba(255,255,255,0.05); 
        }

        /* --- THE DETACHED "X" BOX --- */
        .clear-btn {
            width: 0px; height: 60px; 
            flex-shrink: 0; 
            background: #000; 
            border: 2px solid transparent; 
            color: #f00; 
            font-family: 'PixeloidSansBold', sans-serif; font-size: 22px; 
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-sizing: border-box; padding: 0; margin: 0;
            cursor: pointer;
            z-index: 1;
            line-height: 1;
        }
        
        .search-wrapper.has-text .clear-btn {
            width: 60px; 
            margin-left: 8px; 
            border-color: #f00; 
            opacity: 1; pointer-events: auto;
        }
        
        .clear-btn:hover { 
            background: #f00 !important; 
            color: #000 !important; 
            border-color: #f00 !important;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        /* --- BRACKET KILLSWITCH --- */
        .clear-btn::before, .clear-btn::after, 
        .btn-del::before, .btn-del::after, 
        #save-weather-btn::before, #save-weather-btn::after,
        #export-btn::before, #export-btn::after,
        #import-btn::before, #import-btn::after { 
            content: none !important; display: none !important; 
        }

        /* --- SLIDING PREDICTIVE SEARCH --- */
        #suggestions-box {
            position: absolute; 
            top: 100%; 
            left: 0; 
            width: 100%; 
            background: #050505; border: 2px solid #fff; border-top: none; 
            display: flex; flex-direction: column; 
            z-index: 20; box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);

            transform: translateY(-20px);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s, visibility 0.2s;
            clip-path: inset(0 0 100% 0); 
        }

        #suggestions-box.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            clip-path: inset(0 -50px -50px -50px); 
        }

        .suggestion-item {
            padding: 16px 24px; color: #ccc; font-family: 'PixeloidSans', sans-serif; font-size: 16px;
            border-bottom: 1px solid #111; transition: 0.1s; display: flex; align-items: center;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item.active-item { 
            background: #1a1a1a; color: #fff; padding-left: 32px; border-left: 2px solid #fff;
        }

        /* --- DASHBOARD & NESTED GROUPS --- */
        .dashboard { 
            flex-grow: 1;
            display: grid; 
            grid-template-columns: repeat(auto-fit, 180px); 
            justify-content: center;
            gap: 20px; 
            width: 100%; max-width: 1000px; margin-top: 40px; z-index: 2;
            overflow-y: auto; padding-bottom: 80px;
        }
        .group-container { 
            border: 2px solid #222;
            background: #050505;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
        .group-container:hover {
            border-color: var(--group-color, #fff);
        }
        .group-title { 
            background: var(--group-color, #fff); color: #000; font-family: 'PixeloidSansBold', sans-serif; font-size: 12px; 
            padding: 4px 8px; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; 
            display: inline-block; width: fit-content; text-align: left;
        }
        .quick-links { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; width: 100%; }
        
        .link-card { 
            background: transparent; border: none; padding: 0; 
            text-decoration: none; text-align: left;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; align-items: center; justify-content: flex-start;
        }
        .link-card::before {
            content: '>';
            color: #555;
            font-family: 'PixeloidSansBold', sans-serif;
            margin-right: 8px;
            font-size: 12px;
            transition: color 0.2s;
        }
        .link-card:hover { border: none; background: transparent; transform: translateX(6px); box-shadow: none; }
        .link-card:hover::before { color: var(--group-color, #fff); }
        .link-label { color: #888; font-family: 'PixeloidSansBold', sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; transition: color 0.2s; text-align: left;}
        .link-card:hover .link-label { color: #fff; text-shadow: 0 0 8px var(--group-color, rgba(255,255,255,0.4)); }

        /* --- SHORTCUT BADGE --- */
        #shortcut-badge {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            padding: 4px 8px; font-family: 'PixeloidSansBold', sans-serif; font-size: 10px; letter-spacing: 2px;
            background: #000; border: 1px solid #333; color: #fff;
            opacity: 0; pointer-events: none; transition: all 0.2s; z-index: 10;
        }
        #shortcut-badge.show { opacity: 1; right: 24px; }
        #shortcut-badge.youtube { border-color: #f00; color: #f00; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
        #shortcut-badge.google { border-color: #00ff00; color: #00ff00; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        #shortcut-badge.reddit { border-color: #ff8800; color: #ff8800; box-shadow: 0 0 10px rgba(255,136,0,0.2); }

        /* --- SETTINGS DRAWER --- */
        #settings-drawer {
            position: fixed; top: 0; right: -350px; width: 350px; height: 100vh;
            background: #000; border-left: 2px solid #333; z-index: 100;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white; font-family: 'PixeloidSans', sans-serif; display: flex; flex-direction: column;
        }
        #settings-drawer.open { right: 0; }
        
        #drawer-tab {
            position: absolute; left: -52px; bottom: 40px; width: 50px; height: 50px; 
            background: #000; border: 2px solid #333; border-right: none;
            display: flex; align-items: center; justify-content: center;
        }
        #drawer-tab img { width: 36px; height: 36px; pointer-events: none; transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .gear-spin { transform: rotate(180deg); }

        .drawer-content { padding: 24px; flex-grow: 1; overflow-y: auto; }
        .drawer-header { font-family: 'PixeloidSansBold', sans-serif; color: white; margin-bottom: 24px; font-size: 18px; border-bottom: 1px solid #222; padding-bottom: 12px; letter-spacing: 2px;}

        .setting-section { margin-bottom: 32px; }
        .section-label { display: block; font-family: 'PixeloidSansBold', sans-serif; font-size: 12px; color: #555; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        
        .cheat-sheet { font-size: 10px; color: #444; line-height: 16px; background: #050505; padding: 12px; border: 1px solid #111; margin-top: 12px; }
        .cheat-sheet b { color: #888; }

        /* NESTED MANAGER CSS */
        .manager-group-box { background: #080808; border: 1px solid #222; margin-bottom: 16px; padding: 12px; box-sizing: border-box;}
        .manager-group-header { display: flex; align-items: center; margin-bottom: 12px; gap: 8px;}
        .manager-link-list { display: flex; flex-direction: column; gap: 8px; min-height: 20px; border-left: 2px dashed #222; padding-left: 12px; margin-left: 8px;}
        
        .link-manager-item { display: flex; align-items: center; background: #000; border: 1px solid #222; padding: 6px; gap: 8px; box-sizing: border-box; }
        .handle { padding: 0 4px; color: #333; font-size: 16px; line-height: 1; }
        .manager-input { background: black; border: 1px solid #333; color: #ccc; padding: 0 8px; margin: 0; height: 26px; line-height: 24px; box-sizing: border-box; font-family: 'PixeloidSans', sans-serif; font-size: 12px; outline: none; flex-grow: 1; }
        .manager-input.edit-name { flex-grow: 0; width: 64px; }
        .manager-input.edit-color { flex-grow: 0; width: 36px; padding: 0; cursor: pointer; border: 1px solid #333; }
        .manager-input.edit-color::-webkit-color-swatch-wrapper { padding: 0; }
        .manager-input.edit-color::-webkit-color-swatch { border: none; }
        
        .btn-del { background: #111; color: #f00; border: 1px solid #300; width: 26px; height: 26px; padding: 0; margin: 0; box-sizing: border-box; display: flex; align-items: center; justify-content: center; transition: 0.2s; font-family: 'PixeloidSansBold', sans-serif; font-size: 12px;}
        .btn-del:hover { background: #f00; color: #000; box-shadow: 0 0 10px #f00; border-color: #f00; }
        
        .btn-add { 
            width: 100%; background: #000; color: #fff; border: 1px solid #333; height: 36px; box-sizing: border-box; 
            font-family: 'PixeloidSansBold', sans-serif; font-size: 12px; margin-top: 6px; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center;
        }
        .btn-add:hover { background: #fff; color: #000; border-color: white; }

        /* --- FIXED UI COMPONENTS --- */
        .option-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; min-height: 24px; font-size: 14px;}
        
        .toggle-input { display: none; }
        .toggle-btn { 
            display: block; 
            width: 36px; 
            height: 18px; 
            background: #111; 
            position: relative; 
            border: 2px solid #333; 
            box-sizing: border-box; 
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-btn::after { 
            content: ''; 
            position: absolute; 
            width: 12px; 
            height: 12px; 
            background: #444; 
            top: 1px; 
            left: 1px; 
            transition: 0.2s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .toggle-input:checked + .toggle-btn { background: #fff; border-color: #fff; }
        .toggle-input:checked + .toggle-btn::after { left: 19px; background: #000; }
        
        select { 
            appearance: none; 
            -webkit-appearance: none; 
            background: #080808 url('data:image/svg+xml;utf8,<svg fill="%2355555" height="20" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>') no-repeat right 8px center;
            border: 1px solid #333; 
            color: #ccc; 
            padding: 0 32px 0 12px; 
            height: 36px; 
            box-sizing: border-box; 
            font-family: 'PixeloidSans', sans-serif; 
            width: 100%; 
            outline: none; 
            font-size: 12px; 
            cursor: pointer;
            transition: 0.2s;
        }
        select:hover, select:focus { border-color: #fff; color: #fff; }

        /* --- MINIMAL STATUS BAR --- */
        .status-bar { position: fixed; bottom: 24px; left: 32px; font-family: 'PixeloidSansBold', sans-serif; font-size: 14px; line-height: 14px; color: #444; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 16px; z-index: 5; }
        .weather-module { display: flex; align-items: center; gap: 10px; color: #666; }
        .weather-icon { width: 24px; height: 24px; image-rendering: pixelated; }
        #temp-val { color: #888; }
    </style>
</head>
<body>

    <div id="boss-screen">C:\&gt; </div>

    <div id="settings-drawer">
        <div id="drawer-tab">
            <img src="images/gear.png" id="gear-icon" alt="Settings">
        </div>
        <div class="drawer-content">
            <div class="drawer-header">CORE_SYSTEM</div>
            
            <div class="setting-section">
                <span class="section-label">Search Config</span>
                <select id="engine-select">
                    <option value="duckduckgo">DuckDuckGo</option>
                    <option value="google">Google</option>
                    <option value="youtube">YouTube</option>
                </select>
                <div class="cheat-sheet">
                    <b>yt [query]</b> -> YouTube<br>
                    <b>g  [query]</b> -> Google<br>
                    <b>r/[sub]</b> &nbsp;&nbsp;&nbsp;-> Subreddit<br>
                    <b>Default</b> &nbsp;&nbsp;-> Selected Engine
                </div>
            </div>

            <div class="setting-section">
                <span class="section-label">Interface</span>
                <div class="option-row">
                    <span>Low Power Mode</span>
                    <input type="checkbox" id="toggle-power" class="toggle-input">
                    <label for="toggle-power" class="toggle-btn"></label>
                </div>
                <div class="option-row">
                    <span>Show Status Bar</span>
                    <input type="checkbox" id="toggle-status" class="toggle-input" checked>
                    <label for="toggle-status" class="toggle-btn"></label>
                </div>
                <div class="option-row">
                    <span>Open Links in New Tab</span>
                    <input type="checkbox" id="toggle-newtab" class="toggle-input" checked>
                    <label for="toggle-newtab" class="toggle-btn"></label>
                </div>
                <div class="option-row">
                    <span>24-Hour Time</span>
                    <input type="checkbox" id="toggle-military" class="toggle-input">
                    <label for="toggle-military" class="toggle-btn"></label>
                </div>
            </div>

            <div class="setting-section">
                <span class="section-label">Weather Override</span>
                <div style="display: flex; gap: 6px; align-items: center;">
                    <input type="text" id="weather-loc-input" class="manager-input" placeholder="City or ZIP (Blank for IP)" style="flex-grow: 1;">
                    <button id="save-weather-btn" class="btn-add" style="margin: 0; width: 64px; height: 26px; font-size: 12px;">SET</button>
                </div>
            </div>

            <div class="setting-section">
                <span class="section-label">Link Manager</span>
                <div id="manager-list"></div>
                <button class="btn-add" id="addNewGroupBtn" style="margin-bottom: 24px;">+ ADD GROUP</button>
            </div>

            <div class="setting-section" style="border-top: 1px solid #222; padding-top: 24px;">
                <span class="section-label">System Backup</span>
                <div style="display: flex; gap: 12px;">
                    <button id="export-btn" class="btn-add" style="margin:0; font-size: 10px; white-space: nowrap;">EXPORT JSON</button>
                    <button id="import-btn" class="btn-add" style="margin:0; font-size: 10px; white-space: nowrap;">IMPORT JSON</button>
                    <input type="file" id="import-file" style="display: none;" accept=".json">
                </div>
            </div>
        </div>
    </div>

    <div class="command-center">
        <div id="clock" class="terminal-clock">00:00:00</div>
        <div id="greeting">SYSTEM_ONLINE</div>
        
        <div class="search-wrapper" id="search-wrapper">
            <div class="search-box-container">
                <input type="text" id="web-search" class="search-box" placeholder="type command..." autofocus autocomplete="off">
                <div id="shortcut-badge"></div>
                <div id="suggestions-box"></div>
            </div>
            <button id="clear-search" class="clear-btn">X</button>
        </div>
    </div>

    <div id="dashboard" class="dashboard"></div>

    <div class="status-bar" id="status-bar">
        <span>MIKEVOID_OS</span>
        <span>//</span>
        <div class="weather-module" id="weather-display">
            <img src="images/sunny.png" class="weather-icon" id="weather-img">
            <span id="temp-val">LOADING...</span>
        </div>
    </div>

    <script>
        // --- CORE CONFIGURATION & MIGRATION ---
        const DEFAULT_CONFIG = { 
            showStatus: true, lowPower: false, newTab: true, militaryTime: false, weatherLoc: "", engine: "duckduckgo", 
            linkGroups: [
                { groupName: "MAIN", color: "#ffffff", links: [{name: "HUB", url: "/blog/"}, {name: "YOUTUBE", url: "https://youtube.com"}] }
            ] 
        };
        
        function sanitizeConfig(cfg) {
            // Migrates old flat links into the new Group structure automatically
            if (cfg.links && !cfg.linkGroups) {
                cfg.linkGroups = [{ groupName: "GENERAL", color: "#ffffff", links: cfg.links }];
                delete cfg.links;
            }
            if (cfg.linkGroups) {
                cfg.linkGroups.forEach(g => { if(!g.color) g.color = "#ffffff"; });
            }
            return cfg;
        }

        let savedConfig = JSON.parse(localStorage.getItem('startConfig')) || {};
        savedConfig = sanitizeConfig(savedConfig);
        let config = { ...DEFAULT_CONFIG, ...savedConfig }; 
        const saveConfig = () => localStorage.setItem('startConfig', JSON.stringify(config));

        // --- AUDIO ENGINE ---
        const audioAssets = {
            hover: new Audio('sounds/hoverbutton.wav'), 
            click: new Audio('sounds/buttonclick.mp3'),
            types: [new Audio('sounds/type1.mp3'), new Audio('sounds/type2.mp3'), new Audio('sounds/type3.mp3'), new Audio('sounds/type4.mp3')],
            mouseDown: [new Audio('sounds/mousedown1.mp3'), new Audio('sounds/mousedown2.mp3'), new Audio('sounds/mousedown3.mp3'), new Audio('sounds/mousedown4.mp3')],
            mouseUp: [new Audio('sounds/mouseup1.mp3'), new Audio('sounds/mouseup2.mp3'), new Audio('sounds/mouseup3.mp3'), new Audio('sounds/mouseup4.mp3')]
        };

        let lastMouseIdx = 0; 

        const playSound = (type) => {
            let sound, vol = 0.4;
            if (type === 'hover') { sound = audioAssets.hover; } 
            else if (type === 'click') { sound = audioAssets.click; } 
            else if (type === 'mouseDown') { lastMouseIdx = Math.floor(Math.random() * 4); sound = audioAssets.mouseDown[lastMouseIdx]; vol = 0.05; } 
            else if (type === 'mouseUp') { sound = audioAssets.mouseUp[lastMouseIdx]; vol = 0.05; } 
            else { sound = audioAssets.types[Math.floor(Math.random() * 4)]; }
            
            if (sound) { const clone = sound.cloneNode(); clone.volume = vol; clone.play().catch(()=>{}); }
        };

        window.addEventListener('mousedown', () => playSound('mouseDown'));
        window.addEventListener('mouseup', () => playSound('mouseUp'));

        // --- WEATHER MODULE ---
        async function fetchWeather(force = false) {
            const cacheKey = 'weatherCache';
            const cachedData = JSON.parse(localStorage.getItem(cacheKey));
            const now = new Date().getTime();
            
            if (!force && cachedData && (now - cachedData.timestamp < 900000)) {
                applyWeatherUI(cachedData.temp, cachedData.code);
                return;
            }
            try {
                let lat, lon;
                if (config.weatherLoc && config.weatherLoc.trim() !== "") {
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(config.weatherLoc)}&count=1`);
                    const geoData = await geoRes.json();
                    if (geoData.results && geoData.results.length > 0) {
                        lat = geoData.results[0].latitude;
                        lon = geoData.results[0].longitude;
                    } else throw new Error("Location not found");
                } else {
                    const ipRes = await fetch("https://ipapi.co/json/");
                    const location = await ipRes.json();
                    lat = location.latitude;
                    lon = location.longitude;
                }

                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&temperature_unit=fahrenheit`);
                const data = await res.json();
                const weatherInfo = { temp: Math.round(data.current.temperature_2m), code: data.current.weather_code, timestamp: now };
                localStorage.setItem(cacheKey, JSON.stringify(weatherInfo));
                applyWeatherUI(weatherInfo.temp, weatherInfo.code);
            } catch (e) { document.getElementById('temp-val').innerText = "ERROR"; }
        }

        function applyWeatherUI(temp, code) {
            document.getElementById('temp-val').innerText = `${temp}°F`;
            let icon = "sunny.png";
            if (code >= 1 && code <= 3) icon = "partly cloudy.png";
            else if (code >= 45 && code <= 48) icon = "foggy.png";
            else if (code >= 51 && code <= 67) icon = "rainy.png";
            else if (code >= 71 && code <= 77) icon = "cold.png"; 
            else if (code >= 80 && code <= 82) icon = "rainy.png";
            else if (code >= 95 && code <= 99) icon = "thunderstorm.png";
            else if (code > 3) icon = "cloudy.png";
            if (new Date().getHours() >= 20 || new Date().getHours() <= 5) icon = "night.png";
            document.getElementById('weather-img').src = `images/${icon}`;
        }

        // --- DASHBOARD & NESTED MANAGER UI ---
        function renderMainUI() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';

            config.linkGroups.forEach((group) => {
                if(group.links.length === 0 && group.groupName.trim() === "") return; // Skip blank ghost groups
                
                const groupDiv = document.createElement('div');
                groupDiv.className = 'group-container';
                groupDiv.style.setProperty('--group-color', group.color || '#ffffff');
                
                let linksHTML = group.links.map((link) => `
                    <a href="${link.url}" target="${config.newTab ? "_blank" : "_self"}" class="link-card" onmouseenter="playSound('hover')" onclick="playSound('click')">
                        <div class="link-label">${link.name}</div>
                    </a>
                `).join('');

                groupDiv.innerHTML = `
                    <div class="group-title">${group.groupName}</div>
                    <div class="quick-links">${linksHTML}</div>
                `;
                dashboard.appendChild(groupDiv);
            });
        }

        function renderManager() {
            const manager = document.getElementById('manager-list');
            manager.innerHTML = '';
            
            config.linkGroups.forEach((group, gIdx) => {
                const groupEl = document.createElement('div');
                groupEl.className = 'manager-group-box';
                
                let linksHTML = group.links.map((link, lIdx) => `
                    <div class="link-manager-item">
                        <span class="handle link-handle">::</span>
                        <input type="text" value="${link.name}" class="manager-input edit-name">
                        <input type="text" value="${link.url}" class="manager-input edit-url">
                        <button class="btn-del del-link" data-gidx="${gIdx}" data-lidx="${lIdx}">X</button>
                    </div>
                `).join('');

                groupEl.innerHTML = `
                    <div class="manager-group-header">
                        <span class="handle group-handle" style="color:#555;">[G]</span>
                        <input type="color" value="${group.color || '#ffffff'}" class="manager-input edit-color" title="Group Color">
                        <input type="text" value="${group.groupName}" class="manager-input edit-group-name" style="font-family:'PixeloidSansBold', sans-serif; color: #fff;">
                        <button class="btn-del del-group" data-gidx="${gIdx}">X</button>
                    </div>
                    <div class="manager-link-list">${linksHTML}</div>
                    <button class="btn-add add-link-btn" data-gidx="${gIdx}" style="height: 24px; font-size: 10px; margin-top: 8px;">+ ADD LINK TO GROUP</button>
                `;
                manager.appendChild(groupEl);
            });

            attachManagerEvents();
        }

        function syncDataFromManager() {
            const newGroups = [];
            document.querySelectorAll('.manager-group-box').forEach(groupBox => {
                const groupName = groupBox.querySelector('.edit-group-name').value;
                const groupColor = groupBox.querySelector('.edit-color').value;
                const links = [];
                groupBox.querySelectorAll('.link-manager-item').forEach(linkItem => {
                    links.push({
                        name: linkItem.querySelector('.edit-name').value,
                        url: linkItem.querySelector('.edit-url').value
                    });
                });
                newGroups.push({ groupName, color: groupColor, links });
            });
            config.linkGroups = newGroups;
            saveConfig();
        }

        function applySettings() {
            document.getElementById('status-bar').style.display = config.showStatus ? 'flex' : 'none';
            document.getElementById('toggle-status').checked = config.showStatus;
            document.getElementById('toggle-power').checked = config.lowPower;
            document.getElementById('toggle-newtab').checked = config.newTab; 
            document.getElementById('toggle-military').checked = config.militaryTime; 
            document.getElementById('engine-select').value = config.engine;
            document.getElementById('weather-loc-input').value = config.weatherLoc;
            config.lowPower ? document.body.classList.add('low-power') : document.body.classList.remove('low-power');
        }

        function attachManagerEvents() {
            // Sortable Magic: Groups
            if (typeof Sortable !== 'undefined') {
                Sortable.create(document.getElementById('manager-list'), {
                    handle: '.group-handle', animation: 150,
                    onEnd: () => { syncDataFromManager(); renderMainUI(); renderManager(); }
                });
                
                // Sortable Magic: Links inside groups (Allows dragging between groups!)
                document.querySelectorAll('.manager-link-list').forEach(list => {
                    Sortable.create(list, {
                        group: 'shared-links', handle: '.link-handle', animation: 150,
                        onEnd: () => { syncDataFromManager(); renderMainUI(); renderManager(); }
                    });
                });
            }

            // Save on input change (Without collapsing the menu or dropping focus)
            document.querySelectorAll('.manager-input').forEach(input => {
                input.addEventListener('input', () => {
                    syncDataFromManager(); 
                    renderMainUI();
                });
            });

            // Delete Link
            document.querySelectorAll('.del-link').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation(); playSound('click');
                    syncDataFromManager(); 
                    config.linkGroups[e.target.dataset.gidx].links.splice(e.target.dataset.lidx, 1);
                    saveConfig(); renderManager(); renderMainUI();
                };
            });

            // Delete Entire Group
            document.querySelectorAll('.del-group').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation(); playSound('click');
                    syncDataFromManager();
                    config.linkGroups.splice(e.target.dataset.gidx, 1);
                    saveConfig(); renderManager(); renderMainUI();
                };
            });

            // Add Link to specific group
            document.querySelectorAll('.add-link-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation(); playSound('click');
                    syncDataFromManager();
                    config.linkGroups[e.target.dataset.gidx].links.push({name: "NEW", url: "https://"});
                    saveConfig(); renderManager(); renderMainUI();
                };
            });
        }

        // --- SEARCH BAR & LOGIC ---
        const searchInput = document.getElementById('web-search');
        const clearBtn = document.getElementById('clear-search');
        const searchWrapper = document.getElementById('search-wrapper');
        const suggestionsBox = document.getElementById('suggestions-box');
        let debounceTimer;
        let currentFocus = -1;

        function triggerFlicker() {
            searchInput.classList.remove('flicker');
            void searchInput.offsetWidth; 
            searchInput.classList.add('flicker');
            setTimeout(() => searchInput.classList.remove('flicker'), 200);
        }

        searchInput.addEventListener('focus', triggerFlicker);

        clearBtn.onmousedown = (e) => {
            e.preventDefault(); 
            playSound('click');
            searchInput.value = '';
            searchWrapper.classList.remove('has-text'); 
            suggestionsBox.classList.remove('show');
            searchInput.focus();
        };

        window.addEventListener('keydown', (e) => {
            if (e.repeat) return; 
            
            if (e.key === '`' || e.key === '~') {
                if(document.activeElement.tagName === 'INPUT') return;
                
                e.preventDefault();
                playSound('click');
                document.body.classList.toggle('boss-mode');
                return;
            }
            if (document.body.classList.contains('boss-mode')) return;

            if (e.key === 'Escape') {
                if(searchInput.value) {
                    playSound('click');
                    searchInput.value = '';
                    searchWrapper.classList.remove('has-text');
                    suggestionsBox.classList.remove('show');
                }
                searchInput.blur();
                return;
            }

            if (e.key !== 'Enter' && e.key !== 'Escape' && e.key.length === 1) { playSound('type'); }
            if (e.key === 'Backspace') { playSound('type'); }

            if (document.activeElement !== searchInput && document.activeElement.tagName !== 'INPUT') {
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    if (searchInput.value.length > 0) {
                        searchInput.value = searchInput.value.slice(0, -1);
                        searchInput.focus();
                        searchInput.dispatchEvent(new Event('input')); 
                    }
                    if (searchInput.value.length === 0) searchWrapper.classList.remove('has-text');
                } 
                else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    searchInput.focus();
                }
            }
        });

        searchInput.oninput = () => {
            const query = searchInput.value.trimStart();
            const lowerQuery = query.toLowerCase();
            const badge = document.getElementById('shortcut-badge');

            if (query.length > 0) searchWrapper.classList.add('has-text');
            else searchWrapper.classList.remove('has-text');

            if (lowerQuery.startsWith('yt ')) { badge.className = 'show youtube'; badge.innerText = 'YOUTUBE'; }
            else if (lowerQuery.startsWith('g ')) { badge.className = 'show google'; badge.innerText = 'GOOGLE'; }
            else if (lowerQuery.startsWith('r/')) { badge.className = 'show reddit'; badge.innerText = 'REDDIT'; }
            else { badge.className = ''; }

            if (query.length === 0 || lowerQuery.startsWith('yt ') || lowerQuery.startsWith('g ') || lowerQuery.startsWith('r/')) { 
                suggestionsBox.classList.remove('show'); 
                return; 
            }

            clearTimeout(debounceTimer);
            
            debounceTimer = setTimeout(() => {
                const oldScript = document.getElementById('ddg-autocomplete');
                if (oldScript) oldScript.remove();

                const script = document.createElement('script');
                script.id = 'ddg-autocomplete';
                script.src = `https://duckduckgo.com/ac/?q=${encodeURIComponent(query)}&callback=autocompleteCallback`;
                document.body.appendChild(script);
            }, 300);
        };

        window.autocompleteCallback = (data) => {
            if (searchInput.value.trim().length === 0) { suggestionsBox.classList.remove('show'); return; }
            suggestionsBox.innerHTML = '';
            currentFocus = -1;
            
            if (data && data.length > 0) {
                data.slice(0, 5).forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item'; div.innerText = item.phrase;
                    div.onmouseenter = () => { currentFocus = index; removeActive(suggestionsBox.querySelectorAll('.suggestion-item')); div.classList.add('active-item'); playSound('hover'); };
                    div.onclick = () => { playSound('click'); executeSearch(item.phrase); };
                    suggestionsBox.appendChild(div);
                });
                suggestionsBox.classList.add('show');
            } else { suggestionsBox.classList.remove('show'); }
        };

        function addActive(items) {
            if (!items || items.length === 0) return;
            removeActive(items);
            if (currentFocus >= items.length) currentFocus = 0;
            if (currentFocus < 0) currentFocus = items.length - 1;
            items[currentFocus].classList.add('active-item');
            playSound('hover');
        }

        function removeActive(items) {
            items.forEach(item => item.classList.remove('active-item'));
        }

        function executeSearch(val) {
            if(!val) return;
            const lowerVal = val.toLowerCase();
            if(lowerVal.startsWith('yt ')) window.location.href = `https://youtube.com/results?search_query=${encodeURIComponent(val.substring(3))}`;
            else if(lowerVal.startsWith('g ')) window.location.href = `https://google.com/search?q=${encodeURIComponent(val.substring(2))}`;
            else if(lowerVal.startsWith('r/')) window.location.href = `https://reddit.com/${val}`;
            else {
                const q = encodeURIComponent(val);
                if(config.engine === 'google') window.location.href = `https://google.com/search?q=${q}`;
                else if(config.engine === 'youtube') window.location.href = `https://youtube.com/results?search_query=${q}`;
                else window.location.href = `https://duckduckgo.com/?q=${q}`;
            }
        }

        searchInput.onkeydown = (e) => { 
            let items = suggestionsBox.querySelectorAll('.suggestion-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentFocus++;
                addActive(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentFocus--;
                addActive(items);
            } else if (e.key === 'Enter') { 
                e.preventDefault();
                playSound('click'); 
                if (currentFocus > -1 && items.length > 0 && suggestionsBox.classList.contains('show')) {
                    items[currentFocus].click();
                } else {
                    executeSearch(searchInput.value); 
                }
            } 
        };
        
        // --- SETTINGS DRAWER EVENTS ---
        document.getElementById('toggle-status').onchange = (e) => { config.showStatus = e.target.checked; saveConfig(); applySettings(); };
        document.getElementById('toggle-power').onchange = (e) => { config.lowPower = e.target.checked; saveConfig(); applySettings(); };
        document.getElementById('toggle-newtab').onchange = (e) => { config.newTab = e.target.checked; saveConfig(); renderMainUI(); };
        document.getElementById('toggle-military').onchange = (e) => { config.militaryTime = e.target.checked; saveConfig(); updateClock(); };
        document.getElementById('engine-select').onchange = (e) => { config.engine = e.target.value; saveConfig(); };
        
        // Add a brand new Group
        document.getElementById('addNewGroupBtn').onclick = (e) => { 
            e.stopPropagation(); playSound('click'); 
            syncDataFromManager();
            config.linkGroups.push({groupName: "NEW_GROUP", color: "#ffffff", links: []}); 
            saveConfig(); renderManager(); renderMainUI(); 
        };
        
        document.getElementById('save-weather-btn').onclick = () => {
            playSound('click');
            config.weatherLoc = document.getElementById('weather-loc-input').value;
            saveConfig();
            document.getElementById('temp-val').innerText = "UPDATING...";
            fetchWeather(true); 
        };

        document.getElementById('export-btn').onclick = () => {
            playSound('click');
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "mikevoid_os_backup.json");
            dl.click();
        };
        
        document.getElementById('import-btn').onclick = () => { playSound('click'); document.getElementById('import-file').click(); };
        
        document.getElementById('import-file').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    let importedConfig = JSON.parse(event.target.result);
                    importedConfig = sanitizeConfig(importedConfig);
                    localStorage.setItem('startConfig', JSON.stringify(importedConfig));
                    location.reload();
                } catch (err) { alert("ERROR: Invalid config file structure."); }
            };
            reader.readAsText(file);
        };

        const drawer = document.getElementById('settings-drawer');
        const gearIcon = document.getElementById('gear-icon');
        document.getElementById('drawer-tab').onclick = (e) => { e.stopPropagation(); playSound('click'); drawer.classList.toggle('open'); gearIcon.classList.toggle('gear-spin'); };
        
        window.onclick = (e) => { 
            if (e.target !== searchInput && e.target !== clearBtn && !e.target.closest('#suggestions-box')) suggestionsBox.classList.remove('show');
            if (!drawer.contains(e.target) && !document.getElementById('drawer-tab').contains(e.target) && drawer.classList.contains('open')) { drawer.classList.remove('open'); gearIcon.classList.remove('gear-spin'); }
        };

        // --- CLOCK & CORE LOOP ---
        function updateClock() {
            const now = new Date();
            const month = now.getMonth();
            const date = now.getDate();
            const day = now.getDay();
            let h = now.getHours(), m = String(now.getMinutes()).padStart(2, '0'), s = String(now.getSeconds()).padStart(2, '0');
            
            if (!config.militaryTime) {
                const ampm = h >= 12 ? 'PM' : 'AM'; 
                h = h % 12 || 12;
                document.getElementById('clock').innerText = `${h}:${m}:${s} ${ampm}`;
            } else {
                h = String(h).padStart(2, '0');
                document.getElementById('clock').innerText = `${h}:${m}:${s}`;
            }
            
            let greetingText = "";
            if (month === 9 && date === 31) greetingText = "SYSTEM_HAUNTED";
            else if (month === 11 && date === 25) greetingText = "MERRY_CRISIS";
            else if (month === 0 && date === 1) greetingText = "NEW_CYCLE_INITIATED";
            else if (day === 5 && now.getHours() >= 17) greetingText = "INITIATE_WEEKEND";
            else {
                greetingText = now.getHours() < 12 ? "GOOD_MORNING" : now.getHours() < 18 ? "GOOD_AFTERNOON" : "GOOD_EVENING";
            }
            document.getElementById('greeting').innerText = greetingText;
        }

        function init() { 
            renderMainUI(); 
            renderManager();
            applySettings(); 
            updateClock(); 
            setInterval(updateClock, 1000); 
            fetchWeather(); 
            setInterval(fetchWeather, 300000); 
        }
        init();
    </script>
</body>
